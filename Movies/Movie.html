<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie</title>

<link rel="stylesheet" href="style.css">

<style>
/* 1. HIDE EVERYTHING BY DEFAULT UNTIL FIREBASE SAYS IT'S OK */
body {
  display: none;
}

/* Kill blue tap highlight + focus styles */
* {
  -webkit-tap-highlight-color: transparent;
  tap-highlight-color: transparent;
}

button, a {
  outline: none;
  border: none;
}

button:focus,
button:active,
a:focus,
a:active {
  outline: none;
  box-shadow: none;
}

/* Flex layout to keep the SVG icon and text aligned nicely */
.play-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px; /* Adds space between the icon and the text */
  cursor: pointer;
}
</style>

</head>
<body>

<video class="bg-video" autoplay muted loop id="bgVideo"></video>
<div class="overlay"></div>

<button class="back-btn" onclick="goBack()">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
    <polyline points="15 18 9 12 15 6"></polyline>
  </svg>
</button>

<div class="content">
  <div class="text">
    <h1 id="title"></h1>
    <p id="desc"></p>
    <button class="play-btn" onclick="play()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <polygon points="5 3 19 12 5 21 5 3"></polygon>
      </svg>
      Play
    </button>
  </div>
</div>

<script>
// Extra safety: inject style via JS too (some devices ignore CSS-only)
document.addEventListener("DOMContentLoaded", () => {
  const style = document.createElement("style");
  style.innerHTML = `
    * {
      -webkit-tap-highlight-color: transparent !important;
    }

    button, a {
      outline: none !important;
      -webkit-focus-ring-color: transparent !important;
    }

    button:focus,
    button:active,
    a:focus,
    a:active {
      outline: none !important;
      box-shadow: none !important;
    }
  `;
  document.head.appendChild(style);
});
</script>

<script type="module">
  // NOTE: If you already initialize firebase in another file (like moviepage.js), 
  // make sure getAuth() works here, or update the import version to match your project.
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  
  const auth = getAuth();
  onAuthStateChanged(auth, (user) => {
    if (user) {
      // User logged in! Reveal the page so your original scripts work perfectly.
      document.body.style.display = "block";
    } else {
      // Not logged in! Kick them to the index page immediately.
      window.location.href = "index.html";
    }
  });
</script>

<script src="/JS/moviepage.js" defer></script>
<script src="movies.js"></script>
<script src="script.js"></script>
</body>
</html>
