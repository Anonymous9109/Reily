<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie</title>

<link rel="stylesheet" href="style.css">

<style>
/* Kill blue tap highlight + focus styles */
* {
  -webkit-tap-highlight-color: transparent;
  tap-highlight-color: transparent;
}

button, a {
  outline: none;
  border: none;
}

button:focus,
button:active,
a:focus,
a:active {
  outline: none;
  box-shadow: none;
}
</style>

</head>
<body>

<video class="bg-video" autoplay muted loop id="bgVideo"></video>
<div class="overlay"></div>

<button class="back-btn" onclick="goBack()">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
    <polyline points="15 18 9 12 15 6"></polyline>
  </svg>
</button>

<div class="content">
  <div class="text">
    <h1 id="title"></h1>
    <p id="desc"></p>
    <button class="play-btn" onclick="play()">Play</button>
  </div>
</div>

<script>
// Extra safety: inject style via JS too (some devices ignore CSS-only)
document.addEventListener("DOMContentLoaded", () => {
  const style = document.createElement("style");
  style.innerHTML = `
    * {
      -webkit-tap-highlight-color: transparent !important;
    }

    button, a {
      outline: none !important;
      -webkit-focus-ring-color: transparent !important;
    }

    button:focus,
    button:active,
    a:focus,
    a:active {
      outline: none !important;
      box-shadow: none !important;
    }
  `;
  document.head.appendChild(style);
});
</script>

<script src="/JS/moviepage.js" defer></script>
<script src="movies.js"></script>
<script src="script.js"></script>
