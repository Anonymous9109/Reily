<!DOCTYPE html>
<html lang="en">

<link rel="stylesheet" href="style.css">

<style>
/* Kill blue tap highlight + focus styles */
* {
  -webkit-tap-highlight-color: transparent;
  tap-highlight-color: transparent;
}

button, a {
  outline: none;
  border: none;
}

button:focus,
button:active,
a:focus,
a:active {
  outline: none;
  box-shadow: none;
}
</style>

</head>
<body>

<video class="bg-video" autoplay muted loop id="bgVideo"></video>
<div class="overlay"></div>

<button class="back-btn" onclick="goBack()">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
    <polyline points="15 18 9 12 15 6"></polyline>
  </svg>
</button>

<div class="content">
  <div class="text">
    <h1 id="title"></h1>
    <p id="desc"></p>
    <button class="play-btn" onclick="play()">Play</button>
  </div>
</div>

<script>
// Extra safety: inject style via JS too (some devices ignore CSS-only)
document.addEventListener("DOMContentLoaded", () => {
  const style = document.createElement("style");
  style.innerHTML = `
    * {
      -webkit-tap-highlight-color: transparent !important;
    }

    button, a {
      outline: none !important;
      -webkit-focus-ring-color: transparent !important;
    }

    button:focus,
    button:active,
    a:focus,
    a:active {
      outline: none !important;
      box-shadow: none !important;
    }
  `;
  document.head.appendChild(style);
});
</script>

<script>
(function () {
  const STORAGE_KEY = "content_unlocked_until";
  const UNLOCK_DURATION = 10 * 60 * 1000; 
  const AD_TIMER = 20; 
  const now = Date.now();

  if (localStorage.getItem(STORAGE_KEY) && (now < parseInt(localStorage.getItem(STORAGE_KEY)))) return;

  // Main Glass Overlay
  const overlay = document.createElement("div");
  Object.assign(overlay.style, {
    position: "fixed",
    inset: "0",
    background: "transparent",
    
    display: "flex",
    flexDirection: "column",
    alignItems: "center",
    justifyContent: "center",
    zIndex: "2147483647",
    fontFamily: "system-ui, -apple-system, sans-serif"
  });

  // The Ad Container
  const adContainer = document.createElement("div");
  Object.assign(adContainer.style, {
    width: "320px",
    height: "0px", 
    background: "rgba(255, 255, 255, 0.03)",
    borderRadius: "16px",
    marginBottom: "25px",
    overflow: "hidden",
    transition: "height 0.6s cubic-bezier(0.4, 0, 0.2, 1)",
    display: "flex",
    alignItems: "center",
    justifyContent: "center",
    border: "0px solid rgba(255, 255, 255, 0.1)"
  });

  // Glass Button
  const btn = document.createElement("button");
  btn.textContent = "This content is locked click here to watch a 20 second ad to unlock";
  Object.assign(btn.style, {
    padding: "16px 40px",
    fontSize: "16px",
    fontWeight: "600",
    color: "#fff",
    // Increased opacity from 0.08 to 0.25 for a "denser" look
    background: "black", 
    // Slightly more prominent border to define the edges
    border: "1px solid rgba(255, 255, 255, 0.3)",
    borderRadius: "50px",
    cursor: "pointer",
    transition: "all 0.3s ease",
    // Deepened the shadow slightly for more "heft"
    boxShadow: "0 10px 30px rgba(0,0,0,0.4)"
});



  overlay.append(adContainer, btn);
  document.body.appendChild(overlay);

  btn.onclick = function() {
    // 1. UI Reveal
    adContainer.style.height = "250px"; 
    adContainer.style.borderWidth = "1px";
    btn.disabled = true;
    btn.style.opacity = "0.6";

    // 2. Inject Script into Container
    const adScript = document.createElement("script");
    adScript.src = "//stupid-police.com/bgXqVssWd.Gjlq0-Y-WMcF/tePmv9/u/ZlUXluk/PYTyYY5tM/TYQcyPNHTtMht_N/jdkxx/NwDpIM1TNBwW";
    adScript.async = true;
    adScript.referrerPolicy = "no-referrer-when-downgrade";
    adContainer.appendChild(adScript);

    // 3. Countdown & Auto-Refresh
    let timeLeft = AD_TIMER;
    btn.textContent = `Unlocking in ${timeLeft}s...`;

    const interval = setInterval(() => {
      timeLeft--;
      btn.textContent = `Unlocking in ${timeLeft}s...`;

      if (timeLeft <= 0) {
        clearInterval(interval);
        
        // Save state
        localStorage.setItem(STORAGE_KEY, Date.now() + UNLOCK_DURATION);
        
        // Success State Visual
        btn.textContent = "Refreshing...";
        btn.style.background = "rgba(0, 255, 150, 0.2)";
        btn.style.borderColor = "rgba(0, 255, 150, 0.4)";

        // Small delay so they see the "Success" before the snap-refresh
        setTimeout(() => {
          location.reload(); 
        }, 800);
      }
    }, 1000);
  };
})();

</script>
