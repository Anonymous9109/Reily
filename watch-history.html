<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rinolski | Stream Your Way</title>
    <style>
        :root {
            --brand-color: #d81f26; /* Premium Red */
            --bg-dark: #000000;
            --card-overlay: rgba(0, 0, 0, 0.85);
            --input-fill: #333333;
            --error-box: #e87c03;
            --success-box: #2ecc71;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: #fff; height: 100%; overflow: hidden;
        }

        /* Cinematic Background */
        .viewport {
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.8) 100%), 
                        url('');
            background-size: cover; background-position: center;
            min-height: 100vh; display: flex; flex-direction: column;
        }

        nav { padding: 25px 50px; }
        .logo { color: var(--brand-color); font-size: 2.2rem; font-weight: 900; letter-spacing: -2px; }

        .content-area { flex-grow: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }

        /* The Main Card */
        .card {
            background-color: var(--card-overlay);
            padding: 60px; width: 100%; max-width: 450px;
            border-radius: 4px; box-sizing: border-box;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        h1 { margin: 0 0 28px; font-size: 2rem; font-weight: 700; }

        /* In-page messages */
        .msg {
            padding: 12px 20px; border-radius: 4px; font-size: 0.9rem;
            margin-bottom: 20px; display: none; color: #fff;
        }
        .msg.error { background: var(--error-box); }
        .msg.success { background: var(--success-box); }

        input {
            width: 100%; height: 55px; background: var(--input-fill);
            border: none; border-radius: 4px; padding: 0 20px;
            color: white; box-sizing: border-box; font-size: 1rem; margin-bottom: 16px;
        }

        .btn-main {
            width: 100%; padding: 16px; background: var(--brand-color);
            color: white; border: none; border-radius: 4px;
            font-weight: bold; cursor: pointer; font-size: 1.1rem;
            transition: opacity 0.2s;
        }
        .btn-main:hover { opacity: 0.9; }

        .helper-text { color: #737373; margin-top: 30px; font-size: 1rem; }
        .link { color: #fff; cursor: pointer; text-decoration: none; font-weight: 500; }
        .link:hover { text-decoration: underline; }

        .forgot-link {
            display: block; text-align: right; font-size: 0.85rem;
            color: #b3b3b3; margin-top: -8px; margin-bottom: 20px;
        }

        /* Account / Dashboard Sections */
        #dashboard, #username-step { display: none; }
        .settings-divider { margin-top: 30px; border-top: 1px solid #333; padding-top: 25px; }
        .settings-content { display: none; margin-top: 15px; }
        
        .btn-ghost {
            background: none; border: 1px solid #737373; color: #fff;
            padding: 12px; width: 100%; cursor: pointer; margin-top: 10px; border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="viewport">
    <nav><div class="logo">RINOLSKI</div></nav>

    <div class="content-area">
        <!-- 1. LOGIN / SIGNUP -->
        <div class="card" id="auth-section">
            <h1 id="form-title">Sign In</h1>
            <div id="auth-msg" class="msg"></div>
            
            <form id="authForm">
                <input type="email" id="email" placeholder="Email Address" required>
                <input type="password" id="password" placeholder="Password" required>
                <span class="link forgot-link" id="forgot-password">Forgot password?</span>
                <button type="submit" class="btn-main" id="btn-text">Sign In</button>
            </form>

            <div class="helper-text">
                <span id="footer-prefix">New to Rinolski?</span> 
                <span class="link" id="toggle-auth">Sign up now.</span>
            </div>
        </div>

        <!-- 2. ONE-TIME USERNAME SETUP -->
        <div class="card" id="username-step">
            <h1>Welcome to Rinolski</h1>
            <div id="setup-msg" class="msg"></div>
            <p style="color:#b3b3b3; margin-bottom: 20px;">Let's set up your display name.</p>
            <input type="text" id="initial-username" placeholder="Choose Username">
            <button class="btn-main" id="save-initial">Continue</button>
        </div>

        <!-- 3. ACCOUNT DASHBOARD -->
        <div class="card" id="dashboard">
            <h1>Hello, <span id="display-name" style="color: var(--brand-color);"></span></h1>
            <div id="dash-msg" class="msg"></div>

            <div class="settings-divider">
                <button class="btn-ghost" id="open-settings">Account Settings ▾</button>
                
                <div class="settings-content" id="settings-menu">
                    <input type="text" id="new-name-input" placeholder="Update display name" style="height: 45px;">
                    <button class="btn-main" id="update-profile" style="padding: 10px; font-size: 0.9rem; margin-bottom: 20px;">Update Profile</button>
                    
                    <button class="btn-ghost" id="logout-btn" style="color: var(--brand-color); border-color: var(--brand-color);">Sign Out of Rinolski</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, updateProfile, sendPasswordResetEmail, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCExki28m1NNepVQEIjmcQzR8z8O68LqIc",
        authDomain: "rinolski-notifications.firebaseapp.com",
        projectId: "rinolski-notifications",
        storageBucket: "rinolski-notifications.firebasestorage.app",
        messagingSenderId: "355554579853",
        appId: "1:355554579853:web:3caa961653c0cdc0a359c4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Helpers
    const showMsg = (id, text, success = false) => {
        const el = document.getElementById(id);
        el.innerText = text;
        el.style.display = 'block';
        el.className = success ? 'msg success' : 'msg error';
    };

    let isLogin = true;

    // Switch between Sign In and Sign Up
    document.getElementById('toggle-auth').onclick = () => {
        isLogin = !isLogin;
        document.getElementById('auth-msg').style.display = 'none';
        document.getElementById('form-title').innerText = isLogin ? "Sign In" : "Sign Up";
        document.getElementById('btn-text').innerText = isLogin ? "Sign In" : "Sign Up";
        document.getElementById('footer-prefix').innerText = isLogin ? "New to Rinolski?" : "Already have an account?";
        document.getElementById('toggle-auth').innerText = isLogin ? "Sign up now." : "Sign in here.";
        document.getElementById('forgot-password').style.display = isLogin ? 'block' : 'none';
    };

    // Forgot Password
    document.getElementById('forgot-password').onclick = async () => {
        const email = document.getElementById('email').value;
        if (!email) return showMsg('auth-msg', "Please enter your email address first.");
        try {
            await sendPasswordResetEmail(auth, email);
            showMsg('auth-msg', "Password reset link sent to your email.", true);
        } catch (err) { showMsg('auth-msg', "Account not found or invalid email."); }
    };

    // Handle Form Submit
    document.getElementById('authForm').onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
            if (isLogin) {
                await signInWithEmailAndPassword(auth, email, password);
            } else {
                await createUserWithEmailAndPassword(auth, email, password);
            }
        } catch (err) {
            let errorMsg = "Incorrect email or password.";
            if (err.code === 'auth/weak-password') errorMsg = "Password must be at least 6 characters.";
            if (err.code === 'auth/invalid-email') errorMsg = "Invalid email address.";
            showMsg('auth-msg', errorMsg);
        }
    };

    // Monitor Auth State
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('auth-section').style.display = 'none';
            if (!user.displayName) {
                document.getElementById('username-step').style.display = 'block';
                document.getElementById('dashboard').style.display = 'none';
            } else {
                document.getElementById('username-step').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                document.getElementById('display-name').innerText = user.displayName;
            }
        } else {
            document.getElementById('auth-section').style.display = 'block';
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('username-step').style.display = 'none';
        }
    });

    // Username Setup (Step 2)
    document.getElementById('save-initial').onclick = async () => {
        const name = document.getElementById('initial-username').value;
        if (!name) return showMsg('setup-msg', "Please choose a username.");
        try {
            await updateProfile(auth.currentUser, { displayName: name });
        } catch (err) { showMsg('setup-msg', err.message); }
    };

    // Settings Menu Toggle
    document.getElementById('open-settings').onclick = () => {
        const menu = document.getElementById('settings-menu');
        const isHidden = menu.style.display === 'none' || menu.style.display === '';
        menu.style.display = isHidden ? 'block' : 'none';
        document.getElementById('open-settings').innerText = isHidden ? "Account Settings ▴" : "Account Settings ▾";
    };

    // Update Profile
    document.getElementById('update-profile').onclick = async () => {
        const newName = document.getElementById('new-name-input').value;
        if (!newName) return showMsg('dash-msg', "Please enter a new name.");
        try {
            await updateProfile(auth.currentUser, { displayName: newName });
            document.getElementById('display-name').innerText = newName;
            showMsg('dash-msg', "Profile updated successfully!", true);
            document.getElementById('new-name-input').value = "";
        } catch (err) { showMsg('dash-msg', err.message); }
    };

    // Logout
    document.getElementById('logout-btn').onclick = () => signOut(auth);

</script>
</body>
</html>

                    <input type="text" id="change-user-input" placeholder="New username" style="height: 40px; margin-top:5px;">
                    <button class="btn-red" id="update-user-btn" style="padding: 10px;">Update</button>
                    
                    <button class="btn-outline" id="change-pass-btn">Reset Password via Email</button>
                    <button class="btn-outline" id="logout-btn" style="border-color: var(--primary-red); color: var(--primary-red);">Sign Out</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, updateProfile, sendPasswordResetEmail, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCExki28m1NNepVQEIjmcQzR8z8O68LqIc",
        authDomain: "rinolski-notifications.firebaseapp.com",
        projectId: "rinolski-notifications",
        storageBucket: "rinolski-notifications.firebasestorage.app",
        messagingSenderId: "355554579853",
        appId: "1:355554579853:web:3caa961653c0cdc0a359c4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // DOM Elements
    const toast = document.getElementById('toast');
    const authSection = document.getElementById('auth-section');
    const usernameSetup = document.getElementById('username-setup');
    const dashboard = document.getElementById('dashboard');
    const userDisplay = document.getElementById('user-display');
    const settingsMenu = document.getElementById('settings-menu');

    function showNotify(msg, type = 'error') {
        toast.innerText = msg;
        toast.className = type === 'error' ? 'toast-error' : 'toast-success';
        toast.style.transform = 'translateX(0)';
        setTimeout(() => { toast.style.transform = 'translateX(200%)'; }, 3500);
    }

    let isLogin = true;

    // Toggle Sign In/Up
    document.getElementById('switchBtn').onclick = () => {
        isLogin = !isLogin;
        document.getElementById('title').innerText = isLogin ? "Sign In" : "Sign Up";
        document.getElementById('mainBtn').innerText = isLogin ? "Sign In" : "Sign Up";
        document.getElementById('footerText').innerText = isLogin ? "New to StreamPulse?" : "Already a member?";
        document.getElementById('switchBtn').innerText = isLogin ? "Sign up now." : "Sign in now.";
    };

    // Auth Form Logic
    document.getElementById('authForm').onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
            if (isLogin) {
                await signInWithEmailAndPassword(auth, email, password);
                showNotify("Logged in successfully", "success");
            } else {
                await createUserWithEmailAndPassword(auth, email, password);
                showNotify("Account created!", "success");
            }
        } catch (err) {
            let msg = "An error occurred";
            if (err.code === 'auth/invalid-credential') msg = "Invalid email or password.";
            if (err.code === 'auth/weak-password') msg = "Password is too weak.";
            showNotify(msg, "error");
        }
    };

    // Global Auth Observer (Handles UI State)
    onAuthStateChanged(auth, (user) => {
        if (user) {
            authSection.style.display = 'none';
            if (!user.displayName) {
                usernameSetup.style.display = 'block';
                dashboard.style.display = 'none';
            } else {
                usernameSetup.style.display = 'none';
                dashboard.style.display = 'block';
                userDisplay.innerText = user.displayName;
            }
        } else {
            authSection.style.display = 'block';
            dashboard.style.display = 'none';
            usernameSetup.style.display = 'none';
        }
    });

    // Initial Username Setup
    document.getElementById('complete-setup').onclick = async () => {
        const name = document.getElementById('first-username').value;
        if (!name) return showNotify("Please enter a name");
        try {
            await updateProfile(auth.currentUser, { displayName: name });
            showNotify("Profile Complete!", "success");
            // The Auth Observer will automatically switch to dashboard
        } catch (err) { showNotify(err.message); }
    };

    // Dashboard Settings Toggle
    document.getElementById('toggle-settings').onclick = () => {
        const isHidden = settingsMenu.style.display === 'none' || settingsMenu.style.display === '';
        settingsMenu.style.display = isHidden ? 'block' : 'none';
        document.getElementById('toggle-settings').innerText = isHidden ? "Account Settings ▴" : "Account Settings ▾";
    };

    // Update Username inside Settings
    document.getElementById('update-user-btn').onclick = async () => {
        const newName = document.getElementById('change-user-input').value;
        if (!newName) return showNotify("Enter a new username");
        try {
            await updateProfile(auth.currentUser, { displayName: newName });
            userDisplay.innerText = newName;
            showNotify("Username updated", "success");
            document.getElementById('change-user-input').value = "";
        } catch (err) { showNotify(err.message); }
    };

    // Reset Password
    document.getElementById('change-pass-btn').onclick = async () => {
        try {
            await sendPasswordResetEmail(auth, auth.currentUser.email);
            showNotify("Reset email sent!", "success");
        } catch (err) { showNotify(err.message); }
    };

    // Logout
    document.getElementById('logout-btn').onclick = () => {
        signOut(auth).then(() => showNotify("Signed out", "success"));
    };
</script>
</body>
</html>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rinolski</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #141414;
            color: white;
            padding-bottom: 80px; /* Space for the footer */
        }

        /* Top Logo Header */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 15px 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, transparent 100%);
            z-index: 1000;
        }

        .Rinolski-font {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 34px;
            color: red;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Bottom Footer Navigation */
        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 65px;
            background-color: #000;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #222;
            z-index: 1001;
        }

        .nav-item {
            text-decoration: none;
            color: #b3b3b3;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 11px;
            transition: color 0.2s;
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
            margin-bottom: 4px;
            fill: currentColor;
        }

        .nav-item:hover { color: white; }

        /* Sliding Search Panel */
        #sliding-content {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            height: 100%;
            background: #000;
            transition: right 0.3s ease-in-out;
            z-index: 2000;
            overflow-y: auto;
        }

        .search-header {
            display: flex;
            align-items: center;
            padding: 15px;
            background: #000;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        #back-button {
            background: none;
            border: none;
            cursor: pointer;
            padding: 10px;
        }

        #searchInput {
            flex: 1;
            padding: 12px;
            background: #333;
            border: none;
            color: white;
            border-radius: 6px;
            font-size: 16px;
            margin-left: 10px;
            outline: none;
        }

        /* Styles required by your search.js logic */
        .section-title {
            font-size: 20px;
            margin: 20px 0 10px 20px;
            color: #e5e5e5;
        }

        .movie-section {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            padding: 0 20px 20px 20px;
            scroll-behavior: smooth;
        }

        .movie-section::-webkit-scrollbar { display: none; }

        .movie-item {
            flex: 0 0 auto;
            width: 110px;
            height: 160px;
            background-color: #333;
            border-radius: 4px;
            overflow: hidden;
        }

        .movie-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .no-image { display: none; }
    </style>
</head>
<body>

<header>
    <h2 class="Rinolski-font">rinolski</h2>
</header>


<!-- Main content area -->
<div id="initialSections">
    <!-- This is where your home page content usually lives -->
    <div style="">
  
    </div>
</div>


<footer>
    <a href="Home.html" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        <span>Home</span>
    </a>

    <button id="search-trigger" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>

    </button>

    <a href="watch-history.html" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        <span>Profile</span>
    </a>
</footer>

<!-- Search Interface -->
<div id="sliding-content">
    <div class="search-header">
        <button id="back-button">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        </button>
        <input type="text" id="searchInput" placeholder="Search shows, movies..." onkeyup="searchMovies()">
    </div>
    
    <!-- search.js will inject sections here -->
    <div id="searchResults" style="display: none;"></div>
</div>

<!-- Load your search script here -->
<script src="/JS/search.js"></script>

<script>
    const slidingContent = document.getElementById('sliding-content');
    const searchTrigger = document.getElementById('search-trigger');
    const backButton = document.getElementById('back-button');
    const searchInput = document.getElementById('searchInput');
    const initialSections = document.getElementById('initialSections');
    const searchResults = document.getElementById('searchResults');

    // Open Search Panel
    searchTrigger.addEventListener('click', () => {
        slidingContent.style.right = '0%';
        searchInput.focus();
    });

    // Close Search Panel
    backButton.addEventListener('click', () => {
        slidingContent.style.right = '-100%';
        // Reset view back to initial
        searchInput.value = '';
        initialSections.style.display = "block";
        searchResults.style.display = "none";
        searchResults.innerHTML = "";
    });
</script>

</body>
</html>
