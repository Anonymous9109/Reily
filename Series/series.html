<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Series Detail</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * { -webkit-tap-highlight-color: transparent; tap-highlight-color: transparent; }
        button, a { outline: none; border: none; }
        .season-btn { padding: 10px 15px; background: rgba(255,255,255,0.1); color: white; border-radius: 5px; cursor: pointer;
     margin-bottom: 20px;  
        }

        .season-btn.active { background: red; font-weight: bold; }
        .back-btn {
            position: fixed; top: 20px; left: 20px; width: 45px; height: 45px;
            background: rgba(0,0,0,0.6); border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; cursor: pointer; z-index: 10;
        }
        
        /* Hides the body content until Firebase confirms the user is logged in */
        body { display: none; background-color: #000000; color: white; }
    </style>

    <!-- Firebase SDK CDNs (v10 Compat) matching your index.html -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body>
    <video class="bg-video" autoplay muted loop id="bgVideo"></video>
    <div class="overlay"></div>

    <button id="back-btn" class="back-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
    </button>

    <div class="content">
        <h1 id="title"></h1>
        <p id="desc"></p>

        <div id="seasonNav" class="season-container"></div>

        <div class="episodes-wrapper">
            <div id="episodeList" class="episode-list"></div>
        </div>
    </div>

    <!-- Firebase Setup Initialization -->
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCExki28m1NNepVQEIjmcQzR8z8O68LqIc",
            authDomain: "rinolski-notifications.firebaseapp.com",
            projectId: "rinolski-notifications",
            storageBucket: "rinolski-notifications.firebasestorage.app",
            messagingSenderId: "355554579853",
            appId: "1:355554579853:web:3caa961653c0cdc0a359c4",
            measurementId: "G-WZ84970GST"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // AUTHENTICATION GATEWAY
        auth.onAuthStateChanged(user => {
            if (user) {
                // User is authenticated! Show the layout content
                document.body.style.display = 'block';
            } else {
                // Not logged in? Boot them out immediately to index.html
                window.location.href = '../index';
            }
        });
    </script>

    <!-- External Series Logic Scripts -->
    <script src="https://rinolski.neocities.org/Series/series.js"></script>
    <script src="https://rinolski.neocities.org/Series/script.js"></script>

    <!-- NAVIGATION LOGIC -->
    <script>
        document.getElementById('back-btn').onclick = () => {
            // Check if there is internal history linking from within your own site domain
            if (document.referrer && document.referrer.includes(window.location.hostname)) {
                window.history.back();
            } else {
                // No history, or arrived directly via copy-pasting/new tab? Force back to index.html
                window.location.href = '../index'; 
            }
        };
    </script>
</body>
</html>
