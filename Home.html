<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Rinolski</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --red: #e50914;
      --bg: #050505; 
      --surface: #121212;
      --text: #ffffff;
      --text-muted: #a3a3a3;
      --nav-h: 60px;
      --header-h: 60px;
      --max-width: 1200px;
    }

    body { 
      visibility: hidden; 
      background: var(--bg); 
      margin: 0; padding: 0;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    /* AUTH SCREEN */
    #auth-screen {
      position: fixed; inset: 0;
      background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://assets.nflxext.com/ffe/siteui/vlv3/f841d4c7-10e1-40af-bcae-07a3f8cf141a/web/TN-en-20220502-popsignuptwoweeks-perspective_alpha_website_large.jpg');
      background-size: cover; background-position: center;
      z-index: 9999; display: none; align-items: center; justify-content: center; padding: 15px;
    }

    .auth-card {
      width: 100%; max-width: 380px;
      background: rgba(0, 0, 0, 0.9);
      padding: 40px; border-radius: 8px;
    }

    .auth-input { background: #333; border: none; border-radius: 4px; padding: 14px; color: white; width: 100%; margin-bottom: 15px; outline: none; font-size: 16px; }
    .auth-btn { background: var(--red); color: white; border: none; border-radius: 4px; padding: 14px; width: 100%; font-weight: 700; cursor: pointer; font-size: 16px; }

    /* APP LAYOUT */
    #app { display: none; height: 100vh; flex-direction: column; }
    #app.visible { display: flex; }

    #app-header {
      position: fixed; top: 0; left: 0; right: 0; height: var(--header-h);
      background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; padding: 0 20px; z-index: 500;
    }
    .header-content { width: 100%; max-width: var(--max-width); display: flex; align-items: center; }
    .header-logo { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: var(--red); letter-spacing: 2px; }

    /* SLIDING TRANSITIONS */
    .page-wrapper { flex: 1; position: relative; margin-top: var(--header-h); margin-bottom: var(--nav-h); overflow: hidden; }
    .page {
      position: absolute; inset: 0; width: 100%; height: 100%;
      background: var(--bg); overflow-y: auto;
      transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s;
    }
    
    /* Center content on desktop */
    .content-container { width: 100%; max-width: var(--max-width); margin: 0 auto; padding-bottom: 40px; }

    body.active-home #home-page { transform: translateX(0); opacity: 1; }
    body.active-home #search-page, body.active-home #account-page { transform: translateX(100%); }
    body.active-search #home-page { transform: translateX(-20%); opacity: 0.4; }
    body.active-search #search-page { transform: translateX(0); opacity: 1; }
    body.active-search #account-page { transform: translateX(100%); }
    body.active-account #home-page { transform: translateX(-40%); opacity: 0.2; }
    body.active-account #search-page { transform: translateX(-20%); opacity: 0.4; }
    body.active-account #account-page { transform: translateX(0); opacity: 1; }

    /* COMPACT CONTENT */
    .section-title { font-size: 18px; font-weight: 700; margin: 25px 0 10px 15px; color: #fff; text-transform: capitalize; }
    .movie-row { display: flex; overflow-x: auto; gap: 10px; padding: 0 15px 15px; scroll-behavior: smooth; }
    .movie-row::-webkit-scrollbar { display: none; }
    
    /* Responsive Movie Cards */
    .movie-card { flex: 0 0 auto; width: 110px; height: 160px; border-radius: 4px; overflow: hidden; background: #111; cursor: pointer; transition: transform 0.2s; }
    .movie-card:hover { transform: scale(1.05); }
    .movie-card img { width: 100%; height: 100%; object-fit: cover; }

    /* DESKTOP SPECIFIC OVERRIDES */
    @media (min-width: 768px) {
      .movie-card { width: 160px; height: 230px; }
      .section-title { font-size: 22px; margin-left: 0; }
      .movie-row { gap: 15px; padding: 0 0 20px 0; }
      #search-results { grid-template-columns: repeat(5, 1fr) !important; gap: 15px !important; }
      .auth-card { max-width: 450px; }
    }

    /* NAV */
    #bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; height: var(--nav-h);
      background: #000; display: flex; justify-content: center; border-top: 1px solid #1a1a1a; z-index: 1000;
    }
    .nav-content { width: 100%; max-width: 600px; display: flex; height: 100%; }
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: none; border: none; color: #555; font-size: 11px; gap: 4px; cursor: pointer; transition: color 0.2s; }
    .nav-btn.active { color: white; }
    .nav-btn svg { width: 22px; height: 22px; fill: currentColor; }

    /* SEARCH & HISTORY */
    #search-results { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 0 15px; }
    .history-item { display: flex; align-items: center; gap: 15px; padding: 12px 15px; border-bottom: 1px solid #111; cursor: pointer; }
    .history-item:hover { background: #0f0f0f; }
  </style>
</head>
<body class="active-home">

<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-title" id="auth-label" style="font-size: 28px; font-weight: 700; margin-bottom: 25px;">Sign In</div>
    <input class="auth-input" type="email" id="auth-email" placeholder="Email">
    <input class="auth-input" type="password" id="auth-password" placeholder="Password">
    <button class="auth-btn" id="auth-main-btn" onclick="handleAuthAction()">Sign In</button>
    <div style="margin-top: 20px; font-size: 14px; color: #aaa; text-align: center;">
      <span id="toggle-text">New to Rinolski?</span> <span onclick="toggleAuthMode()" id="toggle-link" style="color:white; text-decoration:underline; cursor:pointer;">Sign up now.</span>
    </div>
  </div>
</div>

<div id="app">
  <div id="app-header">
    <div class="header-content">
      <div class="header-logo">RINOLSKI</div>
    </div>
  </div>
  
  <div class="page-wrapper">
    <div id="home-page" class="page">
      <div class="content-container" id="home-content"></div>
    </div>
    
    <div id="search-page" class="page">
      <div class="content-container">
        <div style="padding: 20px 15px;"><input type="text" id="search-input" placeholder="Search titles, genres..." style="width:100%; padding:15px; background:#1a1a1a; border:none; border-radius:4px; color:white; outline:none; font-size: 16px;"></div>
        <div id="search-results"></div>
      </div>
    </div>

    <div id="account-page" class="page">
      <div class="content-container">
        <div style="padding: 30px 15px; border-bottom: 1px solid #222;">
          <div style="font-size:12px; color:#555; letter-spacing: 1px; font-weight: 700;">MEMBER EMAIL</div>
          <div id="display-email" style="font-size:18px; margin-top: 5px;"></div>
        </div>
        <div class="section-title">Recently Watched</div>
        <div id="history-list"></div>
        <button onclick="handleSignOut()" style="margin:30px 15px; width:calc(100% - 30px); padding:15px; background:#1a1a1a; color:#ff4444; border:1px solid #333; border-radius:4px; font-weight: 600; font-size: 14px; cursor: pointer;">Sign Out of Rinolski</button>
      </div>
    </div>
  </div>

  <nav id="bottom-nav">
    <div class="nav-content">
      <button class="nav-btn active" id="btn-home" onclick="switchPage('home')"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Home</button>
      <button class="nav-btn" id="btn-search" onclick="switchPage('search')"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>Search</button>
      <button class="nav-btn" id="btn-account" onclick="switchPage('account')"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>Account</button>
    </div>
  </nav>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCExki28m1NNepVQEIjmcQzR8z8O68LqIc",
  authDomain: "rinolski-notifications.firebaseapp.com",
  projectId: "rinolski-notifications",
  storageBucket: "rinolski-notifications.firebasestorage.app",
  messagingSenderId: "355554579853",
  appId: "1:355554579853:web:3caa961653c0cdc0a359c4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
let allMovies = [], userDoc = null, isLoginMode = true;

async function loadMovies() {
    const res = await fetch('https://rinolski.online/JS/search.js');
    const txt = await res.text();
    allMovies = new Function(txt + " return movies;")();
}

async function logLoginInfo(email, type) {
    await setDoc(doc(db, "logininformation", email), { email, type, timestamp: new Date().toISOString() }, { merge: true });
}

onAuthStateChanged(auth, async user => {
    if (user) {
        await loadMovies();
        document.getElementById('display-email').textContent = user.email;
        const userRef = doc(db, 'users', user.email);
        const snap = await getDoc(userRef);
        if (!snap.exists()) await setDoc(userRef, { history: [] });
        onSnapshot(userRef, s => { userDoc = s.data(); renderHome(); renderHistory(); });
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app').classList.add('visible');
    } else {
        document.getElementById('app').classList.remove('visible');
        document.getElementById('auth-screen').style.display = 'flex';
    }
    document.body.style.visibility = 'visible';
    renderSearchResults(allMovies);
});

window.handleAuthAction = async () => {
    const e = document.getElementById('auth-email').value, p = document.getElementById('auth-password').value;
    if (!e || !p) return;
    try {
        if (isLoginMode) { await signInWithEmailAndPassword(auth, e, p); await logLoginInfo(e, "Login"); }
        else { await createUserWithEmailAndPassword(auth, e, p); await logLoginInfo(e, "Signup"); }
    } catch (err) { alert(err.message); }
};

window.toggleAuthMode = () => {
    isLoginMode = !isLoginMode;
    document.getElementById('auth-label').innerText = isLoginMode ? "Sign In" : "Sign Up";
    document.getElementById('toggle-text').innerText = isLoginMode ? "New to Rinolski?" : "Already a member?";
    document.getElementById('toggle-link').innerText = isLoginMode ? "Sign up now." : "Sign in now.";
};

window.handleSignOut = () => signOut(auth);

window.switchPage = (p) => {
    document.body.className = `active-${p}`;
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.id === `btn-${p}`));
};

async function recordAndGo(m) {
    const ref = doc(db, 'users', auth.currentUser.email);
    const clean = (userDoc?.history || []).filter(h => h.title !== m.title);
    await updateDoc(ref, { history: [{title: m.title, at: new Date().toISOString()}, ...clean].slice(0, 15) });
    window.location.href = `https://rinolski.online/${m.link}`;
}

function renderHome() {
    const cont = document.getElementById('home-content'); cont.innerHTML = '';
    const genres = [...new Set(allMovies.flatMap(m => m.genres))].sort(() => 0.5 - Math.random());
    genres.forEach(g => {
        const list = allMovies.filter(m => m.genres.includes(g)).sort(() => 0.5 - Math.random());
        const sec = document.createElement('div');
        sec.innerHTML = `<div class="section-title">${g}</div>`;
        const row = document.createElement('div'); row.className = 'movie-row';
        list.forEach(m => {
            const card = document.createElement('div'); card.className = 'movie-card';
            card.innerHTML = `<img src="https://rinolski.online/${m.image}" loading="lazy">`;
            card.onclick = () => recordAndGo(m);
            row.appendChild(card);
        });
        sec.appendChild(row); cont.appendChild(sec);
    });
}

function renderSearchResults(list) {
    const grid = document.getElementById('search-results'); grid.innerHTML = '';
    list.forEach(m => {
        const card = document.createElement('div');
        card.style.cssText = "width:100%; aspect-ratio:100/145; background:#111; border-radius:3px; overflow:hidden; cursor:pointer;";
        card.innerHTML = `<img src="https://rinolski.online/${m.image}" style="width:100%; height:100%; object-fit:cover;">`;
        card.onclick = () => recordAndGo(m);
        grid.appendChild(card);
    });
}

document.getElementById('search-input').addEventListener('input', (e) => {
    const v = e.target.value.toLowerCase();
    const filtered = allMovies.filter(m => m.title.toLowerCase().includes(v) || m.genres.some(g => g.toLowerCase().includes(v)));
    renderSearchResults(filtered);
});

function renderHistory() {
    const list = document.getElementById('history-list'); list.innerHTML = '';
    (userDoc?.history || []).forEach(h => {
        const m = allMovies.find(x => x.title === h.title) || { image: '' };
        const d = new Date(h.at);
        const item = document.createElement('div'); item.className = 'history-item';
        item.innerHTML = `
            <img src="https://rinolski.online/${m.image}" style="width:45px; height:65px; object-fit:cover; border-radius:3px;">
            <div style="flex:1;">
                <div style="font-size:14px; font-weight:500;">${h.title}</div>
                <div style="font-size:11px; color:#555;">${d.toLocaleDateString()} at ${d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
            </div>`;
        item.onclick = () => recordAndGo(m);
        list.appendChild(item);
    });
}
</script>
</body>
</html>
