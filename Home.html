  <script>
    // Prevent pinch-to-zoom but allow scrolling
    let lastTouchEnd = 0;

    document.addEventListener('touchstart', function (event) {
      if (event.touches.length > 1) {
        event.preventDefault(); // Prevent multi-touch gestures like zoom
      }
    }, { passive: false });

    document.addEventListener('touchend', function (event) {
      const now = new Date().getTime();
      if (now - lastTouchEnd <= 300) {
        event.preventDefault(); // Prevent double-tap zoom
      }
      lastTouchEnd = now;
    }, { passive: false });
  </script>
</body>

        /* =========================
   GLOBAL STYLES
   ========================= */
body {
    background-color: black;
    color: white;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    /* Prevents the annoying blue tap highlight on mobile */
    -webkit-tap-highlight-color: transparent;
}

.container {
    padding: 4px;
}

.section {
    margin-bottom: 20px;
}

.section-title {
    margin: 20px 12px;
    font-size: 1.2em;
    font-weight: bold;
}

/* =========================
   MOVIE ROW & CARDS
   ========================= */
.row {
    display: flex;
    overflow-x: auto;
    padding-left: 10px;
}

.row::-webkit-scrollbar {
    display: none;
}

.card {
    position: relative;
    margin-right: 10px;
    width: 100px; /* Adjusted to look more like Netflix mobile */
    height: 150px;
    background-color: #222;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 0 0 auto;
    text-decoration: none;
    color: inherit;
    overflow: hidden; /* CRITICAL: Clips the gray circle to the card */
}

.card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 4px;
    transition: filter 0.3s ease;
}

/* =========================
   THE NETFLIX RIPPLE EFFECT
   ========================= */
.card::after {
    content: "";
    position: absolute;
    top: 50%;
    left: 50%;
    /* Start as a small circle in the middle */
    width: 120%;
    aspect-ratio: 1/1;
    background: rgba(255, 255, 255, 0.2); /* The gray fill */
    border-radius: 50%;
    transform: translate(-50%, -50%) scale(0);
    opacity: 0;
    pointer-events: none;
    z-index: 2;
    /* Reset transition: makes the circle fade away smoothly when released */
    transition: transform 0.4s ease-out, opacity 0.3s ease;
}

/* Triggers when the user is actually PRESSING the card */
.card:active::after {
    transform: translate(-50%, -50%) scale(1.5);
    opacity: 1;
    /* Fast expansion on the initial click */
    transition: transform 0.1s ease-out;
}

/* Optional: Slight dimming on hover to show focus */
.card:hover img {
    filter: brightness(0.8);
}

/* =========================
   BOTTOM NAVIGATION
   ========================= */

    position: fixed;
    bottom: 0;
    width: 100%;

    padding: 10px 0;

    justify-content: space-around;

    z-index: 10;

.bottom-nav div {
    text-align: center;

    font-size: 10px; /* Small label text */
}

.bottom-nav div img {
    width: 24px;
    height: 24px;
    display: block;
    margin: 0 auto 4px;
    filter: grayscale(1); /* Keeps icons muted like Netflix */
}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title>
 <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
</head>
<body>

<h1></h1>
    <button class="random-btn" onclick="window.location.href='subtitles/settings.html';">
      Subtitles Settings
    </button>
<div id="genresSlider"></div>
<div id="homeFeed"></div>


<script>



// Load search.js dynamically
const script = document.createElement("script");
script.src = "/JS/search.js";
script.onload = () => initGenresPage();
document.body.appendChild(script);

// ------------------------------
// Fisher–Yates Shuffle (Randomizer)
// ------------------------------
function shuffleArray(array) {
for (let i = array.length - 1; i > 0; i--) {
const j = Math.floor(Math.random() * (i + 1));
[array[i], array[j]] = [array[j], array[i]];
}
return array;
}

// ------------------------------
// Main Genres Page Builder
// ------------------------------
function initGenresPage() {
if (!window.movies && typeof movies !== "undefined") window.movies = movies;
if (!window.movies) {
console.error("movies not found");
return;
}

const genresSet = new Set();
window.movies.forEach(m => m.genres?.forEach(g => genresSet.add(g.trim())));
const genres = Array.from(genresSet).sort();

const slider = document.getElementById("genresSlider");
const feed = document.getElementById("homeFeed");

// ------------------------------
// Show Movies of a Selected Genre
// (Randomized)
// ------------------------------
function showGenre(genre) {
feed.innerHTML = "";

let filteredMovies = window.movies.filter(m => m.genres.includes(genre));    

// RANDOMIZE EVERY TIME    
filteredMovies = shuffleArray(filteredMovies);    

if (filteredMovies.length) {    
    const row = document.createElement("div");    
    row.classList.add("row");    

    row.innerHTML = filteredMovies.map(m => `    
        <div class="movie-card">    
            <a href="${m.link}">    
                <img src="${m.image}" alt="">    
            </a>    
            <p>${m.title}</p>    
        </div>    
    `).join('');    

    feed.appendChild(row);    
} else {    
    feed.innerHTML = "<p>No movies found for this genre.</p>";    
}

}

// ------------------------------
// Create Buttons for Each Genre
// ------------------------------
genres.forEach(genre => {
const btn = document.createElement("button");
btn.textContent = genre;
btn.onclick = () => showGenre(genre);
slider.appendChild(btn);
});

// ------------------------------
// If URL contains ?genre=...
// ------------------------------
const urlParams = new URLSearchParams(window.location.search);
const selectedGenre = urlParams.get("genre");

if (selectedGenre && genres.includes(selectedGenre)) {
showGenre(selectedGenre);
} else {
feed.innerHTML = ""; // nothing shown if nothing selected
}

}
</script>

</body>
</html>
