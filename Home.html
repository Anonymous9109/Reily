<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Rinolski</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://rinolski.neocities.org/style.css">
</head>
<body class="active-home">

<div id="global-loader"></div>

<div id="auth-screen">
    <div class="auth-container" id="auth-box">
        <div class="auth-face auth-front">
            <h1>RINOLSKI</h1>
            <p style="color:#666; margin-bottom: 25px; font-size: 14px;">Welcome Back</p>
            <div class="auth-error-box" id="signin-error"></div>
            <input type="email" id="login-email" class="auth-input" placeholder="Email">
            <input type="password" id="login-password" class="auth-input" placeholder="Password">
            <div class="auth-forgot" id="forgot-password-btn">Forgot Password?</div>
            <button id="signin-btn" class="auth-btn">Sign In</button>
            <div class="auth-toggle" id="to-signup-btn">New to Rinolski? <b>Sign up.</b></div>
        </div>
        <div class="auth-face auth-back">
            <h1>JOIN US</h1>
            <p style="color:#666; margin-bottom: 25px; font-size: 14px;">Create your account</p>
            <div class="auth-error-box" id="signup-error"></div>
            <input type="email" id="reg-email" class="auth-input" placeholder="Email">
            <input type="password" id="reg-password" class="auth-input" placeholder="Password">
            <button id="signup-btn" class="auth-btn">Sign Up</button>
            <div class="auth-toggle" id="to-signin-btn">Already a member? <b>Sign in.</b></div>
        </div>
    </div>
</div>

<div id="app">
  <div id="app-header"><div class="header-logo">RINOLSKI</div></div>
  <div class="page-wrapper">
    <div id="home-page" class="page">
        <div id="genre-bar"></div>
        <div id="home-content"></div>
    </div>
    <div id="search-page" class="page">
        <input type="text" id="search-input" placeholder="Search movies or genres...">
        <div id="search-results" class="movie-grid"></div>
    </div>
    <div id="account-page" class="page">
        <div style="padding:25px 15px; border-bottom: 1px solid #1a1a1a;">
            <p id="display-email" style="font-weight: bold; margin: 0 0 15px 0; font-size: 18px;"></p>
            <button id="logout-btn" class="auth-btn" style="width:auto; padding:8px 20px; font-size: 12px; background: #222;">Sign Out</button>
        </div>
        <div class="section-title">Viewing History</div>
        <div id="history-list"></div>
    </div>
  </div>
  
  <nav id="bottom-nav">
    <button class="nav-btn active" id="nav-home" data-page="home">
        <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        <span>Home</span>
    </button>
    <button class="nav-btn" id="nav-search" data-page="search">
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <span>Search</span>
    </button>
    <button class="nav-btn" id="nav-account" data-page="account">
        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        <span>Account</span>
    </button>
  </nav>
</div>

<script type="module" src="https://rinolski.neocities.org/app.js"></script>
</body>
</html>
