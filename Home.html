<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Rinolski</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    :root {
      --red: #e50914;
      --bg: #050505; 
      --surface2: #121212;
      --border: #222;
      --text: #ffffff;
      --text-muted: #a3a3a3;
      --nav-h: 72px;
      --header-h: 60px;
    }

    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    /* =====================
       AUTH SCREEN (Netflix-Style)
    ===================== */
    #auth-screen {
      position: fixed;
      inset: 0;
      background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)), url('https://assets.nflxext.com/ffe/siteui/vlv3/f841d4c7-10e1-40af-bcae-07a3f8cf141a/web/TN-en-20220502-popsignuptwoweeks-perspective_alpha_website_large.jpg');
      background-size: cover;
      background-position: center;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #auth-screen.hidden { display: none; }

    .auth-card {
      width: 100%;
      max-width: 400px;
      background: rgba(0, 0, 0, 0.85);
      padding: 40px 30px;
      border-radius: 8px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .auth-title { font-size: 32px; font-weight: 700; margin-bottom: 28px; }
    .auth-form { display: flex; flex-direction: column; gap: 16px; }
    .auth-input { 
      background: #333; border: none; border-radius: 5px; 
      padding: 16px; color: white; outline: none; font-size: 16px; 
    }
    .auth-btn { 
      background: var(--red); color: white; border: none; 
      border-radius: 5px; padding: 16px; font-weight: 700; 
      margin-top: 10px; cursor: pointer; font-size: 16px;
    }
    .auth-toggle { 
      margin-top: 30px; color: var(--text-muted); font-size: 15px; 
    }
    .auth-toggle span { color: white; cursor: pointer; font-weight: 500; text-decoration: underline; }

    /* =====================
       APP SHELL & SLIDES
    ===================== */
    #app { display: none; height: 100vh; flex-direction: column; }
    #app.visible { display: flex; }

    #app-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--header-h);
      background: linear-gradient(to bottom, #000 80%, transparent 100%);
      display: flex;
      align-items: center;
      padding: 0 20px;
      z-index: 500;
    }
    .header-logo { font-family: 'Bebas Neue', sans-serif; font-size: 34px; color: var(--red); letter-spacing: 2px; }

    .page-wrapper {
      flex: 1;
      position: relative;
      margin-top: var(--header-h);
      margin-bottom: var(--nav-h);
      overflow: hidden;
    }

    .page {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      overflow-y: auto;
      transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s;
    }

    body.active-home #home-page { transform: translateX(0); opacity: 1; }
    body.active-home #search-page, body.active-home #account-page { transform: translateX(100%); }

    body.active-search #home-page { transform: translateX(-20%); opacity: 0.4; }
    body.active-search #search-page { transform: translateX(0); opacity: 1; }
    body.active-search #account-page { transform: translateX(100%); }

    body.active-account #home-page { transform: translateX(-40%); opacity: 0.2; }
    body.active-account #search-page { transform: translateX(-20%); opacity: 0.4; }
    body.active-account #account-page { transform: translateX(0); opacity: 1; }

    .section-title { font-size: 19px; font-weight: 600; margin: 24px 0 12px 16px; color: #fff; }
    .movie-row { display: flex; overflow-x: auto; gap: 12px; padding: 0 16px 20px; }
    .movie-row::-webkit-scrollbar { display: none; }
    .movie-card { flex: 0 0 auto; width: 125px; height: 180px; border-radius: 6px; overflow: hidden; background: #111; cursor: pointer; }
    .movie-card img { width: 100%; height: 100%; object-fit: cover; }

    .account-header { padding: 40px 16px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
    .email-label { color: var(--text-muted); font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
    .user-email { font-size: 18px; font-weight: 500; margin-top: 4px; }
    .logout-btn { 
      margin: 30px 16px; padding: 16px; width: calc(100% - 32px); 
      background: #1a1a1a; color: #ff4444; border: 1px solid #333; 
      border-radius: 8px; font-weight: 600; font-size: 15px; cursor: pointer;
    }

    #search-wrap { padding: 15px 16px; position: sticky; top: 0; background: var(--bg); z-index: 10; }
    #search-input { width: 100%; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 15px; color: white; outline: none; font-size: 16px; }
    #search-results { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 0 16px; }

    #bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; height: var(--nav-h);
      background: #000; display: flex; border-top: 1px solid #1a1a1a; z-index: 1000;
    }
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: none; border: none; color: #555; font-size: 11px; gap: 5px; }
    .nav-btn.active { color: white; }
    .nav-btn svg { width: 24px; height: 24px; fill: currentColor; }
  </style>
</head>
<body class="active-home">

<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-title" id="auth-label">Sign In</div>
    <div class="auth-form">
      <input class="auth-input" type="email" id="auth-email" placeholder="Email">
      <input class="auth-input" type="password" id="auth-password" placeholder="Password">
      <button class="auth-btn" id="auth-main-btn" onclick="handleAuthAction()">Sign In</button>
    </div>
    <div class="auth-toggle">
      <span id="toggle-text">New to Rinolski?</span> <span onclick="toggleAuthMode()" id="toggle-link">Sign up now.</span>
    </div>
  </div>
</div>

<div id="app">
  <div id="app-header"><div class="header-logo">RINOLSKI</div></div>
  <div class="page-wrapper">
    <div id="home-page" class="page"><div id="home-content"></div></div>
    
    <div id="search-page" class="page">
      <div id="search-wrap">
        <input type="text" id="search-input" placeholder="Search movies, shows, genres..." autocomplete="off">
      </div>
      <div id="search-results"></div>
    </div>

    <div id="account-page" class="page">
        <div class="account-header">
            <div class="email-label">Member Email</div>
            <div class="user-email" id="display-email">Not Signed In</div>
        </div>
        <div class="section-title">Recently Viewed</div>
        <div id="history-list"></div>
        <button class="logout-btn" onclick="handleSignOut()">Sign Out of Rinolski</button>
    </div>
  </div>

  <nav id="bottom-nav">
    <button class="nav-btn active" id="btn-home" onclick="switchPage('home')">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Home
    </button>
    <button class="nav-btn" id="btn-search" onclick="switchPage('search')">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>Search
    </button>
    <button class="nav-btn" id="btn-account" onclick="switchPage('account')">
      <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>Account
    </button>
  </nav>
</div>

<script src="../JS/search.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCExki28m1NNepVQEIjmcQzR8z8O68LqIc",
  authDomain: "rinolski-notifications.firebaseapp.com",
  projectId: "rinolski-notifications",
  storageBucket: "rinolski-notifications.firebasestorage.app",
  messagingSenderId: "355554579853",
  appId: "1:355554579853:web:3caa961653c0cdc0a359c4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
let userDoc = null;
let isLoginMode = true;

// Wait for movie data to load from search.js
// Assumes search.js defines a global variable named 'movies'
const getMovies = () => window.movies || [];

onAuthStateChanged(auth, async user => {
  if (user) {
    document.getElementById('display-email').textContent = user.email;
    const ref = doc(db, 'users', user.uid);
    const snap = await getDoc(ref);
    if (!snap.exists()) await setDoc(ref, { history: [] });
    
    onSnapshot(ref, s => { 
      userDoc = s.data(); 
      renderHome(); 
      renderHistory(); 
    });
    
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('app').classList.add('visible');
    renderSearchResults(getMovies());
  } else {
    document.getElementById('auth-screen').classList.remove('hidden');
    document.getElementById('app').classList.remove('visible');
  }
});

window.toggleAuthMode = () => {
  isLoginMode = !isLoginMode;
  document.getElementById('auth-label').innerText = isLoginMode ? "Sign In" : "Sign Up";
  document.getElementById('auth-main-btn').innerText = isLoginMode ? "Sign In" : "Sign Up";
  document.getElementById('toggle-text').innerText = isLoginMode ? "New to Rinolski?" : "Already have an account?";
  document.getElementById('toggle-link').innerText = isLoginMode ? "Sign up now." : "Sign in now.";
};

window.handleAuthAction = () => {
  const email = document.getElementById('auth-email').value;
  const pass = document.getElementById('auth-password').value;
  if (!email || !pass) return alert("Please fill in all fields.");
  
  if (isLoginMode) {
    signInWithEmailAndPassword(auth, email, pass).catch(e => alert(e.message));
  } else {
    createUserWithEmailAndPassword(auth, email, pass).catch(e => alert(e.message));
  }
};

window.handleSignOut = () => signOut(auth);

window.switchPage = (p) => {
  document.body.className = `active-${p}`;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.id === `btn-${p}`));
};

async function recordAndGo(m) {
  if (auth.currentUser) {
    const ref = doc(db, 'users', auth.currentUser.uid);
    const history = userDoc?.history || [];
    const clean = history.filter(h => h.title !== m.title);
    await updateDoc(ref, { 
      history: [{title: m.title, watchedAt: new Date().toISOString()}, ...clean].slice(0, 20) 
    });
  }
  window.location.href = m.link;
}

function renderHome() {
  const cont = document.getElementById('home-content');
  const movieList = getMovies();
  cont.innerHTML = '';

  if (userDoc?.history?.length > 0) {
    const watchedG = [...new Set(userDoc.history.flatMap(h => movieList.find(m => m.title === h.title)?.genres || []))];
    const recs = movieList.filter(m => m.genres.some(g => watchedG.includes(g)) && !userDoc.history.some(h => h.title === m.title));
    
    if (recs.length > 0) {
      appendRow(cont, "For You", recs.sort(() => 0.5 - Math.random()).slice(0, 12));
    }
  }

  const allGenres = [...new Set(movieList.flatMap(m => m.genres))];
  const shuffledGenres = allGenres.sort(() => 0.5 - Math.random());

  shuffledGenres.forEach(g => {
    const genreMovies = movieList.filter(m => m.genres.includes(g)).sort(() => 0.5 - Math.random());
    appendRow(cont, g, genreMovies);
  });
}

function appendRow(parent, title, list) {
  const div = document.createElement('div');
  div.innerHTML = `<div class="section-title">${title}</div>`;
  const row = document.createElement('div');
  row.className = 'movie-row';
  
  list.forEach(m => {
    const card = document.createElement('div');
    card.className = 'movie-card';
    card.innerHTML = `<img src="${m.image}" loading="lazy">`;
    card.onclick = () => recordAndGo(m);
    row.appendChild(card);
  });
  
  div.appendChild(row);
  parent.appendChild(div);
}

function renderSearchResults(list) {
  const grid = document.getElementById('search-results');
  grid.innerHTML = '';
  list.forEach(m => {
    const card = document.createElement('div');
    card.style.cssText = 'width:100%; aspect-ratio:2/3; border-radius:6px; overflow:hidden; background:#111; cursor:pointer;';
    card.innerHTML = `<img src="${m.image}" style="width:100%; height:100%; object-fit:cover;">`;
    card.onclick = () => recordAndGo(m);
    grid.appendChild(card);
  });
}

document.getElementById('search-input').addEventListener('input', (e) => {
  const val = e.target.value.toLowerCase();
  const movieList = getMovies();
  if (!val) {
    renderSearchResults(movieList.sort(() => 0.5 - Math.random()).slice(0, 12));
    return;
  }
  const filtered = movieList.filter(m => 
    m.title.toLowerCase().includes(val) || 
    m.genres.some(g => g.toLowerCase().includes(val))
  );
  renderSearchResults(filtered);
});

function renderHistory() {
    const list = document.getElementById('history-list');
    const movieList = getMovies();
    list.innerHTML = '';
    const historyData = userDoc?.history || [];
    
    if (historyData.length === 0) {
        list.innerHTML = '<div style="padding:20px; color:#555; text-align:center;">No history yet.</div>';
        return;
    }

    historyData.forEach(h => {
        const m = movieList.find(x => x.title === h.title) || { image: 'images/placeholder.jpg', link: '#' };
        const item = document.createElement('div');
        item.style.cssText = 'display:flex; align-items:center; gap:15px; padding:12px 16px; border-bottom:1px solid #1a1a1a; cursor:pointer;';
        item.innerHTML = `
            <img src="${m.image}" style="width:50px; height:75px; border-radius:4px; object-fit:cover;">
            <div>
                <div style="font-size:15px; font-weight:500;">${h.title}</div>
                <div style="font-size:12px; color:var(--text-muted); margin-top:3px;">Watched on ${new Date(h.watchedAt).toLocaleDateString()}</div>
            </div>`;
        item.onclick = () => recordAndGo(m);
        list.appendChild(item);
    });
}
</script>
</body>
</html>
